<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Supplies - Employee Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
  </head>
  <body class="dashboard-page">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="employee_dashboard.html" class="logo">
          <img src="../applicant_page/images/vtsa_white.png" alt="VTSA Logo" />
        </a>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="employee_dashboard.html#profile" class="nav-link"
              ><i class="fas fa-user-edit"></i>
              <span>Update Information</span></a
            >
          </li>
          <li>
            <a href="request.html" class="nav-link active"
              ><i class="fas fa-box-open"></i> <span>Request Supplies</span></a
            >
          </li>
          <li>
            <a href="conference_schedule.html" class="nav-link"
              ><i class="fas fa-calendar-alt"></i>
              <span>Conference Schedule</span></a
            >
          </li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <ul>
          <li>
            <a href="login.html"
              ><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a
            >
          </li>
        </ul>
      </div>
    </aside>
    <div class="main-container">
      <header class="top-bar">
        <button id="sidebar-toggle" class="sidebar-toggle-btn">
          <i class="fas fa-bars"></i>
        </button>
        <div class="top-bar-title">Request Office Supplies</div>
      </header>
      <main class="main-content">
        <div class="profile-info-wrapper">
          <!-- Dropdown to select form -->
          <div
            class="form-group"
            style="
              border-bottom: 1px solid var(--border-color);
              padding-bottom: 1.5rem;
              margin-bottom: 1.5rem;
            "
          >
            <label for="request_type_select">Request Type</label>
            <select id="request_type_select" name="request_type_select">
              <option value="bond_paper">Request Bond Paper</option>
              <option value="other_supplies">
                Request Other Office Supplies
              </option>
            </select>
          </div>

          <!-- Bond Paper Form Container -->
          <div id="bond_paper_form_container">
            <h2
              class="centered-header"
              style="margin-bottom: 1.5rem; font-size: 1.5rem"
            >
              Request Bond Paper
            </h2>
            <form
              onsubmit="
                event.preventDefault();
                alert('Bond paper request submitted successfully!');
              "
            >
              <div class="form-group">
                <label for="paper_size">Paper Size</label>
                <select id="paper_size" name="paper_size" required>
                  <option value="">-- Select Size --</option>
                  <option value="A4">A4</option>
                  <option value="Long">Long (8.5" x 13")</option>
                </select>
              </div>
              <div class="form-group">
                <label for="paper_quantity">Quantity (in reams)</label>
                <input
                  type="number"
                  id="paper_quantity"
                  name="paper_quantity"
                  min="1"
                  value="1"
                  required
                />
              </div>
              <div class="form-group">
                <label for="paper_department">Department</label>
                <input
                  type="text"
                  id="paper_department"
                  name="paper_department"
                  placeholder="e.g. HR, Engineering, Sales"
                  required
                />
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  Submit Paper Request
                </button>
              </div>
            </form>
          </div>

          <!-- Other Supplies Form Container (hidden by default) -->
          <div id="other_supplies_form_container" style="display: none">
            <h2
              class="centered-header"
              style="margin-bottom: 1.5rem; font-size: 1.5rem"
            >
              Request Other Office Supplies
            </h2>
            <form
              onsubmit="
                event.preventDefault();
                alert('General supply request submitted successfully!');
              "
            >
              <div class="form-group">
                <label for="item_name">Item Name</label>
                <input
                  type="text"
                  id="item_name"
                  name="item_name"
                  placeholder="e.g. Stapler, Ballpen, Ink Cartridge"
                  required
                />
              </div>
              <div class="form-group">
                <label for="quantity">Quantity</label>
                <input
                  type="number"
                  id="quantity"
                  name="quantity"
                  min="1"
                  value="1"
                  required
                />
              </div>
              <div class="form-group">
                <label for="employee_name">Employee Name</label>
                <input
                  type="text"
                  id="employee_name"
                  name="employee_name"
                  placeholder="Enter your full name"
                  required
                />
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  Submit Request
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
