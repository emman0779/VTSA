<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <h2>Create Account</h2>
      <div class="sub-head">Get started with your new account</div>

      <form
        onsubmit="
          event.preventDefault();
          alert('Registration successful! Please log in.');
          window.location.href = 'login.html';
        "
      >
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Marcia Brady"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="marcia@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="··········"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            placeholder="··········"
            required
          />
        </div>

        <div class="form-group">
          <div class="checkbox">
            <input type="checkbox" id="is-employee" name="is-employee" />
            <label for="is-employee">Are you an employee?</label>
          </div>
        </div>

        <div class="form-group" id="position-group" style="display: none">
          <label for="employee-position">Position</label>
          <input
            type="text"
            id="employee-position"
            name="employee-position"
            readonly
          />
        </div>

        <div class="form-group" id="employee-id-group" style="display: none">
          <label for="employee-id">Employee ID</label>
          <input
            type="text"
            id="employee-id"
            name="employee-id"
            placeholder="e.g., 12345"
          />
        </div>

        <div class="form-group" id="e-signature-group" style="display: none">
          <label for="e-signature">Upload E-Signature</label>
          <input
            type="file"
            id="e-signature"
            name="e-signature"
            accept="image/png, image/jpeg"
          />
        </div>

        <button type="submit" class="login-btn">Register</button>

        <div class="signup-message">
          Already have an account? <a href="index.html">Sign in</a>
        </div>
      </form>
    </div>

    <!-- Position Selection Modal -->
    <div id="position-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Select Your Position</h3>
        <div class="form-group">
          <select
            id="position-select"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 5px;
              border: 1px solid #ccc;
            "
          >
            <option value="">-- Select Position --</option>
            <option value="Admin Staff">Admin Staff</option>
            <option value="Technician">Technician</option>
            <option value="Manager">Manager</option>
            <option value="Sales Officer">Sales Officer</option>
          </select>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            id="confirm-position"
            class="btn btn-primary"
            style="padding: 8px 20px"
          >
            Confirm
          </button>
          <button
            type="button"
            id="cancel-position"
            class="btn btn-secondary"
            style="padding: 8px 20px"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
