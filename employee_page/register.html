<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="login-page">

<div class="login-card">
  <h2>Create Account</h2>
  <div class="sub-head">Get started with your new account</div>

  <form onsubmit="event.preventDefault(); alert('Registration successful! Please log in.'); window.location.href='login.html';">
    <div class="form-group">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Marcia Brady" required>
    </div>

    <div class="form-group">    
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="marcia@example.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="··········" required>
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" name="confirm-password" placeholder="··········" required>
    </div>

    <div class="form-group">
      <div class="checkbox">
        <input type="checkbox" id="is-employee" name="is-employee">
        <label for="is-employee">Are you an employee?</label>
      </div>
    </div>

    <div class="form-group" id="employee-id-group" style="display: none;">
      <label for="employee-id">Employee ID</label>
      <input type="text" id="employee-id" name="employee-id" placeholder="e.g., 12345">
    </div>

    <button type="submit" class="login-btn">Register</button>

    <div class="signup-message">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
