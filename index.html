<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VTSA · Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <div class="login-card">
      <h2>Welcome Back</h2>
      <div class="sub-head">Sign in to your account</div>

      <form action="login.php" method="POST">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="marcia@example.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="··········"
            required
          />
        </div>

        <div class="row-flex">
          <div class="checkbox">
            <input type="checkbox" id="remember" name="remember" checked />
            <label for="remember">Remember me</label>
          </div>
          <a
            href="#"
            class="forgot-link"
            onclick="
              alert('✉️ (demo) password reset link would be sent.');
              return false;
            "
            >Forgot password?</a
          >
        </div>

        <button type="submit" class="login-btn">Sign in</button>

        <div class="signup-message">
          Dont have an account? <a href="register.html">Create account</a>
        </div>
      </form>
    </div>
  </body>
</html>
